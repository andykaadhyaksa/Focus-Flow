<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="dropGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#2D6FB8"/>
      <stop offset="100%" stop-color="#1D4E89"/>
    </linearGradient>
    <linearGradient id="brownGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A0703F"/>
      <stop offset="100%" stop-color="#8B5E34"/>
    </linearGradient>
    <linearGradient id="grayGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3C4148"/>
      <stop offset="100%" stop-color="#2F3339"/>
    </linearGradient>
    <linearGradient id="dropShine" x1="20%" y1="10%" x2="50%" y2="60%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.4)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Bottom layer: dark gray chevron -->
  <path d="M14,86 L60,108 L106,86 L106,72 L60,94 L14,72 Z" fill="url(#grayGrad)"/>

  <!-- Middle layer: brown chevron -->
  <path d="M14,62 L60,84 L106,62 L106,48 L60,70 L14,48 Z" fill="url(#brownGrad)"/>

  <!-- Top layer: blue water drop -->
  <path d="M60,8 C60,8 86,42 86,58 C86,72 75,82 60,82 C45,82 34,72 34,58 C34,42 60,8 60,8 Z" fill="url(#dropGrad)"/>
  <path d="M60,8 C60,8 86,42 86,58 C86,72 75,82 60,82 C45,82 34,72 34,58 C34,42 60,8 60,8 Z" fill="url(#dropShine)" opacity="0.5"/>
  <path d="M50,36 C46,44 44,52 44,58" stroke="rgba(255,255,255,0.5)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
</svg>
